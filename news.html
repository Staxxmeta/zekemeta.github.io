<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zekemeta — Signal Feed</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --dark: #111111;
    --card: #161616;
    --border: #222;
    --gold: #d4a843;
    --gold-dim: #8a6e2a;
    --muted: #555;
    --text: #ccc;
    --white: #f0f0f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--black); color: var(--white); font-family: 'DM Mono', monospace; min-height: 100vh; }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 18px 32px; background: rgba(10,10,10,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
  .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.9rem; color: var(--gold); letter-spacing: 0.05em; text-decoration: none; }
  .nav-back { font-size: 0.7rem; color: var(--muted); text-decoration: none; letter-spacing: 0.1em; }
  .nav-back:hover { color: var(--gold); }
  .feed-hero { padding: 120px 32px 48px; border-bottom: 1px solid var(--border); }
  .feed-eyebrow { font-size: 0.7rem; color: var(--gold); letter-spacing: 0.15em; margin-bottom: 12px; }
  .feed-title { font-family: 'Syne', sans-serif; font-size: 2.4rem; font-weight: 800; line-height: 1.1; margin-bottom: 8px; }
  .feed-title span { color: var(--gold); }
  .feed-sub { font-size: 0.75rem; color: var(--muted); margin-bottom: 24px; }
  .refresh-btn { display: inline-flex; align-items: center; gap: 8px; background: var(--gold); color: #000; border: none; padding: 10px 20px; font-family: 'DM Mono', monospace; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.1em; cursor: pointer; transition: opacity 0.2s; }
  .refresh-btn:hover { opacity: 0.85; }
  .refresh-btn.loading { opacity: 0.6; pointer-events: none; }
  .filters { padding: 24px 32px; display: flex; flex-wrap: wrap; gap: 8px; border-bottom: 1px solid var(--border); position: sticky; top: 57px; z-index: 50; background: rgba(10,10,10,0.95); backdrop-filter: blur(8px); }
  .filter-btn { font-family: 'DM Mono', monospace; font-size: 0.65rem; padding: 6px 14px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; letter-spacing: 0.08em; transition: all 0.2s; }
  .filter-btn:hover { border-color: var(--gold-dim); color: var(--text); }
  .filter-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(212,168,67,0.08); }
  .feed-container { padding: 0 32px 80px; max-width: 800px; }
  .feed-status { padding: 32px 0 16px; font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; border-bottom: 1px solid var(--border); margin-bottom: 0; }
  .news-item { border-bottom: 1px solid var(--border); padding: 24px 0; cursor: pointer; transition: background 0.15s; animation: fadeUp 0.4s ease both; }
  .news-item:hover { background: rgba(255,255,255,0.02); margin: 0 -32px; padding: 24px 32px; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .news-tag { display: inline-block; font-size: 0.6rem; letter-spacing: 0.12em; color: var(--gold); margin-bottom: 8px; }
  .news-headline { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--white); line-height: 1.3; margin-bottom: 8px; }
  .news-summary { font-size: 0.75rem; color: var(--muted); line-height: 1.6; margin-bottom: 12px; }
  .news-meta { display: flex; align-items: center; gap: 16px; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.05em; }
  .news-source { color: var(--gold-dim); }
  .news-link { margin-left: auto; color: var(--gold); font-size: 0.65rem; text-decoration: none; letter-spacing: 0.1em; opacity: 0; transition: opacity 0.2s; }
  .news-item:hover .news-link { opacity: 1; }
  .skeleton { border-bottom: 1px solid var(--border); padding: 24px 0; }
  .skel-line { background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 2px; margin-bottom: 10px; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .feed-error { padding: 48px 0; text-align: center; font-size: 0.8rem; color: var(--muted); }
  .feed-error span { display: block; font-size: 2rem; margin-bottom: 16px; }
  @media (max-width: 600px) { nav { padding: 16px 20px; } .feed-hero { padding: 100px 20px 36px; } .feed-title { font-size: 1.8rem; } .filters { padding: 16px 20px; top: 53px; } .feed-container { padding: 0 20px 60px; } .news-item:hover { margin: 0 -20px; padding: 24px 20px; } }
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="/">ZEKEMETA</a>
  <a class="nav-back" href="/">← BACK</a>
</nav>
<div class="feed-hero">
  <p class="feed-eyebrow">// SIGNAL FEED — AI POWERED</p>
  <h1 class="feed-title">The news that<br/><span>actually matters.</span></h1>
  <p class="feed-sub" id="lastUpdated">Loading...</p>
  <button class="refresh-btn" id="refreshBtn" onclick="loadFeed()">↻ &nbsp;REFRESH FEED</button>
</div>
<div class="filters">
  <button class="filter-btn active" data-cat="all" onclick="setFilter('all', this)">ALL</button>
  <button class="filter-btn" data-cat="crypto" onclick="setFilter('crypto', this)">CRYPTO / DOGE</button>
  <button class="filter-btn" data-cat="money" onclick="setFilter('money', this)">SOUND MONEY</button>
  <button class="filter-btn" data-cat="geo" onclick="setFilter('geo', this)">GEOPOLITICS</button>
  <button class="filter-btn" data-cat="tech" onclick="setFilter('tech', this)">DEPIN / AI / TECH</button>
</div>
<div class="feed-container">
  <div class="feed-status" id="feedStatus">— LOADING SIGNAL —</div>
  <div id="newsFeed"></div>
</div>
<script>
let allArticles = [];
let currentFilter = 'all';
const categories = {
  crypto: { label: 'CRYPTO / DOGE', prompt: 'Dogecoin, Bitcoin, crypto markets, Doginal Dogs NFT, Ordinals inscriptions, DOGE price, crypto regulation' },
  money:  { label: 'SOUND MONEY', prompt: 'gold price, silver price, sound money, Federal Reserve, inflation, dollar debasement, BRICS, petrodollar, interest rates' },
  geo:    { label: 'GEOPOLITICS', prompt: 'military aviation, US military, B-2 bomber, aircraft carrier, global geopolitics, NATO, Middle East, China Taiwan, defense news' },
  tech:   { label: 'DEPIN / AI / TECH', prompt: 'DePIN decentralized physical infrastructure, AI news, n8n automation, Wingbits ADS-B, Helium network, tech innovation' }
};
function setFilter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFeed();
}
function renderFeed() {
  const feed = document.getElementById('newsFeed');
  const status = document.getElementById('feedStatus');
  const filtered = currentFilter === 'all' ? allArticles : allArticles.filter(a => a.category === currentFilter);
  status.textContent = `— ${filtered.length} STORIES —`;
  if (filtered.length === 0) { feed.innerHTML = '<div class="feed-error"><span>📡</span>No stories in this category yet. Try refreshing.</div>'; return; }
  feed.innerHTML = filtered.map((article, i) => `
    <div class="news-item" style="animation-delay:${i * 0.06}s" onclick="window.open('${article.url || '#'}', '_blank')">
      <div class="news-tag">${categories[article.category]?.label || 'NEWS'}</div>
      <div class="news-headline">${article.headline}</div>
      <div class="news-summary">${article.summary}</div>
      <div class="news-meta">
        <span class="news-source">${article.source}</span>
        <span>${article.time}</span>
        ${article.url ? '<a class="news-link" href="' + article.url + '" target="_blank">READ →</a>' : ''}
      </div>
    </div>
  `).join('');
}
function showSkeleton() {
  document.getElementById('newsFeed').innerHTML = Array(6).fill(`
    <div class="skeleton">
      <div class="skel-line" style="width:80px;height:10px;margin-bottom:14px;"></div>
      <div class="skel-line" style="width:90%;height:18px;margin-bottom:8px;"></div>
      <div class="skel-line" style="width:70%;height:18px;margin-bottom:16px;"></div>
      <div class="skel-line" style="width:100%;height:11px;margin-bottom:6px;"></div>
      <div class="skel-line" style="width:85%;height:11px;margin-bottom:6px;"></div>
      <div class="skel-line" style="width:60%;height:11px;"></div>
    </div>`).join('');
}
async function fetchCategoryNews(cat, info) {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: [{ role: 'user', content: `Search for the 3 most important and recent news stories about: ${info.prompt}. Return ONLY a JSON array with exactly 3 objects with keys: headline, summary, source, url, time. Raw JSON only, no markdown.` }]
    })
  });
  const data = await response.json();
  const textBlock = data.content?.find(b => b.type === 'text');
  if (!textBlock) return [];
  try {
    const clean = textBlock.text.replace(/```json|```/g, '').trim();
    return JSON.parse(clean).map(a => ({ ...a, category: cat }));
  } catch { return []; }
}
async function loadFeed() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');
  btn.textContent = '↻  FETCHING SIGNAL...';
  showSkeleton();
  document.getElementById('feedStatus').textContent = '— SCANNING FEEDS —';
  try {
    const results = await Promise.all(Object.entries(categories).map(([cat, info]) => fetchCategoryNews(cat, info)));
    allArticles = results.flat();
    const now = new Date();
    document.getElementById('lastUpdated').textContent = `Live signal · Updated ${now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })} at ${now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}`;
    renderFeed();
  } catch {
    document.getElementById('newsFeed').innerHTML = '<div class="feed-error"><span>⚠️</span>Signal lost. Tap refresh to try again.</div>';
    document.getElementById('feedStatus').textContent = '— CONNECTION ERROR —';
  }
  btn.classList.remove('loading');
  btn.innerHTML = '↻ &nbsp;REFRESH FEED';
}
loadFeed();
</script>
</body>
</html>
